# Example docker-compose for running a T4T client and provider side-by-side
# against a single local Bee node. Copy to docker-compose.yml and edit env
# values. See docs/spec.md §7 for the full env reference.

services:
  bee:
    image: ethersphere/bee:latest
    restart: unless-stopped
    environment:
      BEE_API_ADDR: ":1633"
      BEE_BLOCKCHAIN_RPC_ENDPOINT: ${GNOSIS_RPC_URL:-https://rpc.gnosischain.com}
      BEE_FULL_NODE: "true"
    ports:
      - "1633:1633"
    volumes:
      - bee_data:/home/bee/.bee

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  t4t-client:
    image: t4t:dev
    build: ./container
    restart: unless-stopped
    depends_on: [bee]
    environment:
      T4T_MODE: client
      BEE_API_URL: http://bee:1633
      GNOSIS_RPC_URL: ${GNOSIS_RPC_URL}
      REGISTRY_ADDRESS: ${REGISTRY_ADDRESS}
      ESCROW_ADDRESS: ${ESCROW_ADDRESS}
      XBZZ_ADDRESS: ${XBZZ_ADDRESS}
      POSTAGE_BATCH_ID: ${POSTAGE_BATCH_ID}
      WALLET_KEY: ${CLIENT_WALLET_KEY}
      T4T_HTTP_PORT: "8080"
      T4T_SELECTION_STRATEGY: top_rep_cheapest
      T4T_DEFAULT_DEADLINE_SECONDS: "300"
      T4T_FAKE_STREAMING: "true"
    ports:
      - "8080:8080"

  t4t-provider:
    image: t4t:dev
    build: ./container
    restart: unless-stopped
    depends_on: [bee, ollama]
    environment:
      T4T_MODE: provider
      BEE_API_URL: http://bee:1633
      # Any OpenAI-compatible backend: Ollama (:11434), vLLM (:8000), LiteLLM, …
      OPENAI_BASE_URL: http://ollama:11434
      # OPENAI_API_KEY: ${OPENAI_API_KEY}   # uncomment for vLLM/cloud backends that require auth
      GNOSIS_RPC_URL: ${GNOSIS_RPC_URL}
      REGISTRY_ADDRESS: ${REGISTRY_ADDRESS}
      ESCROW_ADDRESS: ${ESCROW_ADDRESS}
      XBZZ_ADDRESS: ${XBZZ_ADDRESS}
      POSTAGE_BATCH_ID: ${POSTAGE_BATCH_ID}
      WALLET_KEY: ${PROVIDER_WALLET_KEY}
      # Offerings are auto-discovered from the backend's /v1/models.
      # To stop offering a model, remove it from the backend (e.g. `ollama rm <model>`) and restart.
      # Default prices applied to newly-discovered models. Per-model overrides
      # live on-chain and are editable from http://localhost:8090/admin/models.
      # Values are xBZZ wei per 1M tokens; xBZZ has 16 decimals so 1e16 wei = 1 BZZ.
      T4T_INPUT_PRICE_DEFAULT:  "3000000000000000"   # 0.3 BZZ / 1M input tokens
      T4T_OUTPUT_PRICE_DEFAULT: "15000000000000000"  # 1.5 BZZ / 1M output tokens
      T4T_HEARTBEAT_INTERVAL_SECONDS: "300"
      T4T_MAX_CONCURRENT_JOBS: "2"

volumes:
  bee_data:
  ollama_data:
