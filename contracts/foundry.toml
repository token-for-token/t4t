[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
eth_rpc_url = "gnosis"
fs_permissions = [{ access = "read", path = "./" }]

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
gnosis = "https://rpc.gnosischain.com"
chiado = "https://rpc.chiadochain.net"
local  = "http://localhost:8545"
