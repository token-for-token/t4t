[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./" }]

# Fuzz / invariant defaults — overridden in CI for deeper sweeps.
[fuzz]
runs = 256

[invariant]
runs = 256
depth = 500
fail_on_revert = false

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
gnosis = "https://rpc.gnosischain.com"
chiado = "https://rpc.chiadochain.net"
local  = "http://localhost:8545"

[etherscan]
gnosis = {key = "${GNOSISSCAN_API_KEY}", url = "https://api.gnosisscan.io/api", chain = 100}
chiado = {key = "${GNOSISSCAN_API_KEY}", url = "https://gnosis-chiado.blockscout.com/api", chain = 10200}
